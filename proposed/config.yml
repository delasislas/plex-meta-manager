libraries:
  Movies:
    metadata_path:
    report_path: config/reports/Movies_reports.yml
    - pmm: seasonal
      template_variables:
        use_separator: true
        use_independence: true
        sort_by: random
    - pmm: oscars
    - pmm: studio
    - pmm: studio_anime
    - pmm: universe
    - pmm: franchise
    - pmm: resolution



settings:
  cache: true
  cache_expiration: 60
  check_nightly: false
  save_report: true
  tvdb_language: eng
  verify_ssl: true
  custom_repo:
  ignore_ids:
  ignore_imdb_ids:

  asset_directory:
  - config/assets
  asset_folders: true
  create_asset_folders: true
#  assets_for_all: false
  prioritize_assets: true
  asset_depth: 0
  show_missing_assets: true
  show_asset_not_needed: true
  show_missing_season_assets: false
  show_missing_episode_assets: false
  dimensional_asset_rename: false
  download_url_assets: false

  playlist_sync_to_users: all
  playlist_exclude_users:
  playlist_report: true

  show_missing: true
  sync_mode: append
  show_unmanaged: false
  show_filtered: false
  missing_only_released: true
  collection_minimum: 1
  delete_below_minimum: false

  run_again_delay: 2
  item_refresh_delay: 0
  delete_not_scheduled: false
  only_filter_missing: false
  show_unconfigured: true
  show_options: false
  default_collection_order: release

plex:
  url: -
  token: -
  timeout: 60
  clean_bundles: false
  empty_trash: false
  optimize: false
tmdb:
  apikey: -
  language: en
  cache_expiration: 60
  region: US